# NemoClaw on Kubernetes
# Uses official installer with Docker-in-Docker for sandbox isolation.
# Prerequisites: kubectl create namespace nemoclaw
apiVersion: v1
kind: Pod
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app: nemoclaw
spec:
  securityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  automountServiceAccountToken: false
  enableServiceLinks: false
  containers:
    # Docker daemon (DinD)
    - name: dind
      image: docker:24-dind-rootless
      securityContext:
        privileged: false
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: true  # required for newuidmap/newgidmap
        seccompProfile:
          type: Unconfined  # required for user namespace setup by rootlesskit
        capabilities:
          drop:
            - ALL
          add:
            - SETUID     # newuidmap
            - SETGID     # newgidmap
            - SETFCAP    # file capabilities during image builds
            - NET_ADMIN  # k3s/flannel CNI network setup
            - NET_RAW    # k3s/flannel VXLAN and kube-proxy
      env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        # Rootlesskit: use the pod network namespace directly instead of
        # creating an isolated slirp4netns namespace.  Without this, k3s
        # and the socat proxy live in different network namespaces and
        # inference routing from the sandbox to host.openshell.internal
        # breaks.
        - name: DOCKERD_ROOTLESS_ROOTLESSKIT_NET
          value: "host"
        # Rootlesskit: propagate mount events from the pod into the
        # rootless mount namespace so k3s can bind-mount volumes into
        # sandbox containers.
        - name: DOCKERD_ROOTLESS_ROOTLESSKIT_FLAGS
          value: "--propagation=rslave"
      volumeMounts:
        - name: docker-storage
          mountPath: /home/rootless/.local/share/docker
        - name: docker-socket
          mountPath: /run/user/1000
        - name: docker-config
          mountPath: /home/rootless/.config/docker
      resources:
        requests:
          memory: "8Gi"
          cpu: "2"

    # Docker socket proxy — filters API access from workspace to daemon.
    # Only the proxy has the raw socket; workspace talks TCP to the proxy.
    - name: docker-proxy
      image: tecnativa/docker-socket-proxy:0.6.0
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 65534   # nobody
        runAsGroup: 1000   # matches fsGroup — grants access to rootless socket
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: DOCKER_SOCKET
          value: /docker-socket/docker.sock
        # Deny everything by default, then allow only what NemoClaw needs
        - name: LOG
          value: "1"              # log all requests for audit
        - name: POST
          value: "1"              # allow POST (needed for create/start)
        - name: CONTAINERS
          value: "1"              # /containers/* — create, start, stop, inspect
        - name: IMAGES
          value: "1"              # /images/* — pull images
        - name: NETWORKS
          value: "1"              # /networks/* — container networking
        - name: VOLUMES
          value: "1"              # /volumes/* — data volumes
        - name: INFO
          value: "1"              # /info — daemon health check
        - name: VERSION
          value: "1"              # /version — docker version
        # Everything else denied by default. If the installer needs BUILD
        # or EXEC, set the corresponding var to "1" and document why.
        - name: EXEC
          value: "0"              # explicitly deny exec into inner containers
        - name: BUILD
          value: "0"              # deny build (installer pulls pre-built images)
      volumeMounts:
        - name: docker-socket
          mountPath: /docker-socket
          readOnly: true
      livenessProbe:
        tcpSocket:
          port: 2375
        initialDelaySeconds: 5
        periodSeconds: 10
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "250m"

    # Workspace - runs official NemoClaw installer
    - name: workspace
      image: node:22
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      command:
        - bash
        - -c
        - |
          set -e

          # Install packages
          echo "[1/4] Installing packages..."
          apt-get update -qq
          apt-get install -y -qq docker.io socat curl >/dev/null 2>&1

          # Start socat proxy for K8s DNS bridge
          echo "[2/4] Starting socat proxy..."
          socat TCP-LISTEN:8000,fork,reuseaddr TCP:$DYNAMO_HOST &
          # Add hosts entry so validation can reach socat via host.openshell.internal
          echo "127.0.0.1 host.openshell.internal" >> /etc/hosts
          sleep 1

          # Wait for Docker
          echo "[3/4] Waiting for Docker daemon..."
          for i in $(seq 1 45); do
            if docker info >/dev/null 2>&1; then break; fi
            sleep 2
          done
          docker info >/dev/null 2>&1 || { echo "Docker not ready (daemon or proxy may have failed to start)"; exit 1; }
          echo "Docker ready"

          # Default to a dummy compatible API key for unauthenticated endpoints
          # such as Dynamo/vLLM while still allowing a Secret-backed override.
          export COMPATIBLE_API_KEY="${COMPATIBLE_API_KEY:-dummy}"

          # Run official NemoClaw installer
          echo "[4/4] Running NemoClaw installer..."
          umask 077
          curl --proto '=https' --tlsv1.2 --fail --show-error --silent \
            --location \
            --output /tmp/nemoclaw-install.sh \
            https://www.nvidia.com/nemoclaw.sh
          chmod 700 /tmp/nemoclaw-install.sh
          bash /tmp/nemoclaw-install.sh
          rm -f /tmp/nemoclaw-install.sh

          # Keep running after onboard
          echo "Onboard complete. Container staying alive."
          exec sleep infinity
      env:
        - name: DOCKER_HOST
          value: tcp://localhost:2375
        # Dynamo endpoint (raw host:port for socat) - UPDATE THIS FOR YOUR CLUSTER
        - name: DYNAMO_HOST
          value: "vllm-disagg-frontend.dynamo.svc.cluster.local:8000"
        # NemoClaw config (uses host.openshell.internal via socat)
        - name: NEMOCLAW_NON_INTERACTIVE
          value: "1"
        - name: NEMOCLAW_PROVIDER
          value: "custom"
        - name: NEMOCLAW_ENDPOINT_URL
          value: "http://host.openshell.internal:8000/v1"
        - name: COMPATIBLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: nemoclaw-compatible-api-key
              key: api-key
              optional: true
        - name: NEMOCLAW_MODEL
          value: "meta-llama/Llama-3.1-8B-Instruct"
        - name: NEMOCLAW_SANDBOX_NAME
          value: "my-assistant"
        - name: NEMOCLAW_POLICY_MODE
          value: "suggested"
        - name: NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE
          value: "1"
      resources:
        requests:
          memory: "4Gi"
          cpu: "2"

  initContainers:
    # Configure Docker daemon for cgroup v2
    - name: init-docker-config
      image: busybox
      securityContext:
        readOnlyRootFilesystem: true
      command:
        - sh
        - -c
        - |
          mkdir -p /config/docker
          echo '{"default-cgroupns-mode":"host"}' > /config/docker/daemon.json
      volumeMounts:
        - name: docker-config
          mountPath: /config/docker

  volumes:
    - name: docker-storage
      emptyDir: {}
    - name: docker-socket
      emptyDir: {}
    - name: docker-config
      emptyDir: {}

  restartPolicy: Never
